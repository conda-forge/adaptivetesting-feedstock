schema_version: 1

context:
  python_min: "3.12"
  version: "1.2"

package:
  name: adaptivetesting
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/adaptivetesting/adaptivetesting-${{ version }}.tar.gz
  sha256: 1a80a58a2f657a8dc1d663974bb5d020564c4ab7fddf008ffb944345ce1256f7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
    - setuptools
    - cython
  run:
    - python >=${{ python_min }}
    - numpy >=2.1.0
    - pandas >=2.3.0
    - scipy >=1.15.0
    - tqdm >=4.66.0
    - matplotlib-base >=3.10.0
    - numdifftools >=0.9.42

tests:
  - python:
      imports:
        - adaptivetesting
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: adaptivetesting is a Python package that can be used to simulate and evaluate custom CAT scenarios as well as implement them in real-world testing scenarios from a single codebase
  license: MPL-2.0
  license_file: LICENSE
  homepage: https://github.com/condecon/adaptivetesting
  documentation: https://github.com/condecon/adaptivetesting/tree/main/docs

extra:
  recipe-maintainers:
    - condecon
